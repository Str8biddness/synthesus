<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthesus 2.0 — Test Console</title>
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --border: #2a2d38;
    --text: #e0e2ea;
    --text2: #888da0;
    --accent: #5b8af5;
    --accent2: #3d6ce0;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); }
  .header .version { font-size: 0.7rem; color: var(--text2); background: var(--surface2); padding: 3px 8px; border-radius: 4px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .stat-chip { background: var(--surface2); padding: 4px 10px; border-radius: 4px; color: var(--text2); font-size: 0.72rem; }
  .stat-chip b { color: var(--accent); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }
  
  /* Sidebar */
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); padding: 16px 16px 8px; }
  .char-list { flex: 1; overflow-y: auto; }
  .char-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; font-size: 0.82rem; }
  .char-item:hover { background: var(--surface2); }
  .char-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .char-item .name { font-weight: 600; }
  .char-item .desc { font-size: 0.7rem; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mode-select { padding: 12px 16px; border-top: 1px solid var(--border); }
  .mode-select label { font-size: 0.7rem; color: var(--text2); display: block; margin-bottom: 4px; }
  .mode-select select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 4px; font-size: 0.8rem; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); }
  .chat-header .char-name { font-weight: 600; font-size: 0.95rem; }
  .chat-header .char-role { font-size: 0.75rem; color: var(--text2); }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; line-height: 1.55; position: relative; }
  .msg.user { align-self: flex-end; background: var(--accent2); border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg .meta-line { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 10px; flex-wrap: wrap; }
  .msg .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; }
  .tag.source-rag { background: rgba(91,138,245,0.2); color: var(--accent); }
  .tag.source-cognitive { background: rgba(52,211,153,0.2); color: var(--green); }
  .tag.source-fallback { background: rgba(248,113,113,0.2); color: var(--red); }
  .tag.conf { background: rgba(167,139,250,0.15); color: var(--purple); }
  .tag.latency { background: rgba(251,191,36,0.15); color: var(--orange); }
  .tag.emotion { background: rgba(255,255,255,0.08); color: var(--text2); }

  .sources-panel { margin-top: 6px; font-size: 0.72rem; color: var(--text2); }
  .sources-panel summary { cursor: pointer; color: var(--accent); font-size: 0.7rem; }
  .source-item { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .source-item .score { color: var(--green); font-weight: 600; }

  /* Input */
  .input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; }
  .input-area input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; outline: none; }
  .input-area input:focus { border-color: var(--accent); }
  .input-area button { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; }
  .input-area button:hover { background: var(--accent2); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  .typing { color: var(--text2); font-size: 0.8rem; padding: 4px 14px; }
  .clear-btn { background: transparent; color: var(--text2); border: 1px solid var(--border); font-size: 0.75rem; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  .clear-btn:hover { background: var(--surface2); }
</style>
</head>
<body>

<div class="header">
  <h1>SYNTHESUS 2.0</h1>
  <span class="version">v2.0.0</span>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
    <span class="stat-chip">RAG: <b id="ragCount">-</b></span>
    <span class="stat-chip">Characters: <b id="charCount">-</b></span>
    <span class="stat-chip">Requests: <b id="reqCount">-</b></span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Characters</div>
    <div class="char-list" id="charList"></div>
    <div class="mode-select">
      <label>Processing Mode</label>
      <select id="modeSelect">
        <option value="auto">Auto (cognitive → RAG → fallback)</option>
        <option value="cognitive">Cognitive Engine Only</option>
        <option value="rag">RAG Only</option>
      </select>
    </div>
    <div style="padding: 12px 16px; border-top: 1px solid var(--border);">
      <button class="clear-btn" onclick="clearChat()" style="width:100%">Clear Conversation</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <span class="char-name" id="chatCharName">Select a character</span>
      <span class="char-role" id="chatCharRole"></span>
    </div>
    <div class="messages" id="messages">
      <div style="text-align:center;color:var(--text2);font-size:0.8rem;margin-top:40px">
        Select a character and start chatting to test the Synthesus engine.
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="queryInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let activeChar = 'synth';
let sessionId = crypto.randomUUID();
let characters = [];

// Load characters
async function loadCharacters() {
  try {
    const r = await fetch(`${BASE}/api/v1/characters`);
    const d = await r.json();
    characters = d.characters;
    renderCharList();
    selectChar('synth');
  } catch(e) { console.error('Failed to load characters:', e); }
}

function renderCharList() {
  const el = document.getElementById('charList');
  el.innerHTML = characters.map(c => `
    <div class="char-item ${c.id === activeChar ? 'active' : ''}" onclick="selectChar('${c.id}')">
      <div class="name">${c.name}</div>
      <div class="desc">${c.description || c.role || ''}</div>
    </div>
  `).join('');
}

function selectChar(id) {
  activeChar = id;
  const c = characters.find(x => x.id === id);
  document.getElementById('chatCharName').textContent = c ? c.name : id;
  document.getElementById('chatCharRole').textContent = c ? (c.role || c.description || '') : '';
  renderCharList();
  document.getElementById('queryInput').focus();
}

function clearChat() {
  sessionId = crypto.randomUUID();
  document.getElementById('messages').innerHTML = `
    <div style="text-align:center;color:var(--text2);font-size:0.8rem;margin-top:40px">
      Conversation cleared. Session: ${sessionId.slice(0,8)}...
    </div>`;
}

function addMessage(role, content, meta) {
  const el = document.getElementById('messages');
  // Remove placeholder
  const placeholder = el.querySelector('div[style*="text-align:center"]');
  if (placeholder) placeholder.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  
  let html = escapeHtml(content);
  
  if (meta) {
    html += '<div class="meta-line">';
    if (meta.source) html += `<span class="tag source-${meta.source}">${meta.source.toUpperCase()}</span>`;
    if (meta.confidence != null) html += `<span class="tag conf">${(meta.confidence * 100).toFixed(1)}%</span>`;
    if (meta.latency_ms != null) html += `<span class="tag latency">${meta.latency_ms.toFixed(0)}ms</span>`;
    if (meta.emotion) html += `<span class="tag emotion">${meta.emotion}</span>`;
    html += '</div>';
    
    if (meta.sources && meta.sources.length > 0) {
      html += '<details class="sources-panel"><summary>RAG Sources (' + meta.sources.length + ')</summary>';
      meta.sources.forEach(s => {
        html += `<div class="source-item"><span class="score">${(s.score * 100).toFixed(1)}%</span> — ${escapeHtml(s.pattern || '')}</div>`;
      });
      html += '</details>';
    }
  }
  
  div.innerHTML = html;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function sendMessage() {
  const input = document.getElementById('queryInput');
  const q = input.value.trim();
  if (!q) return;
  
  input.value = '';
  addMessage('user', q);
  
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '...';
  
  try {
    const r = await fetch(`${BASE}/api/v1/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        query: q,
        character: activeChar,
        mode: document.getElementById('modeSelect').value,
        session_id: sessionId,
        include_sources: true,
        include_debug: true,
      })
    });
    
    if (r.status === 429) {
      addMessage('assistant', 'Rate limit exceeded. Wait a moment before trying again.', {source: 'error'});
      return;
    }
    
    const d = await r.json();
    addMessage('assistant', d.response, {
      source: d.source,
      confidence: d.confidence,
      latency_ms: d.latency_ms,
      emotion: d.emotion,
      sources: d.sources,
    });
  } catch(e) {
    addMessage('assistant', 'Connection error: ' + e.message, {source: 'error'});
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
    input.focus();
  }
}

// Health polling
async function pollHealth() {
  try {
    const r = await fetch(`${BASE}/api/v1/health`);
    const d = await r.json();
    document.getElementById('statusDot').style.background = d.status === 'healthy' ? 'var(--green)' : 'var(--red)';
    document.getElementById('statusText').textContent = d.status === 'healthy' ? 'Online' : 'Degraded';
    document.getElementById('ragCount').textContent = d.rag.vectors.toLocaleString();
    document.getElementById('charCount').textContent = d.characters_loaded;
    document.getElementById('reqCount').textContent = d.total_requests;
  } catch(e) {
    document.getElementById('statusDot').style.background = 'var(--red)';
    document.getElementById('statusText').textContent = 'Offline';
  }
}

// Init
loadCharacters();
pollHealth();
setInterval(pollHealth, 5000);
</script>
</body>
</html>
